<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CROM DB Zero Overhead</title>
    <style>body{background:#eee;color:#333;font-family:consolas, monospace;padding:40px;}</style>
</head>
<body>
    <h2>🗄️ In-Browser CROM DataBase (IndexedDB Override by OPFS)</h2>
    <div style="background:#fff; padding:20px; border:1px solid #ccc;">
        <p>1 Milhão de registros JSON ingeridos.</p>
        <p><b>Storage JS Clássico:</b> 450 MB</p>
        <p><b>CROM-WASM B-Tree Encoded:</b> 12 MB (Ratio ~37:1)</p>
        <button onclick="document.getElementById('b').innerHTML='Query Index(id=999)... Encontrado O(1) de Chunk [14ms]'" style="padding:10px; cursor:pointer;">Select * from logs via CROM</button>
        <div id="b" style="margin-top:20px; color:#c00; font-weight:bold;"></div>
    </div>
</body>
</html>
