<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROM P2P Semantic Torrent</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#06060f; color:#fff; font-family:'JetBrains Mono', monospace; overflow:hidden;}
        header { background:#111; padding:20px; border-bottom:1px solid #333; text-align:center;}
        h1 { color: #fe5f55; margin:0; font-size:22px;}
        .container { display:flex; height:calc(100vh - 65px); }
        .peer { flex:1; padding:20px; border-right:1px solid #333; display:flex; flex-direction:column; position:relative;}
        .peer:last-child { border-right:none; }
        
        h2 { font-size:16px; color:#aaa; margin-top:0;}
        .log { flex:1; background:#000; border:1px solid #444; border-radius:4px; padding:10px; overflow-y:auto; font-size:11px; color:#0f0; margin-bottom:15px;}
        
        .box { background:#222; padding:15px; border-radius:4px; text-align:center; cursor:pointer; margin-bottom:15px; border:2px dashed #555;}
        .box:hover { border-color:#fe5f55; color:#fe5f55;}
        
        .net-visuals { height:150px; background:#0a0a0a; border:1px solid #222; position:relative; overflow:hidden; border-radius:4px;}
        .packet { position:absolute; width:10px; height:10px; background:#fe5f55; border-radius:50%; top:50%; transform:translateY(-50%); box-shadow:0 0 10px #fe5f55;}
        
        @keyframes shoot {
            from { left: 0%; }
            to { left: 100%; }
        }
        .animating { animation: shoot 1.5s linear forwards; }
    </style>
</head>
<body>
    <header>
        <h1>WebRTC + CROM Torrent Semântico</h1>
    </header>
    <div class="container">
        <!-- PEER A (Sender) -->
        <div class="peer" id="peerA">
            <h2>💻 Client A (Seeder)</h2>
            <div class="box" id="sendBtn">
                📁 Transmitir Filme (1.5GB)
            </div>
            <div class="log" id="logA"></div>
        </div>
        
        <!-- NETWORK VISUALIZER -->
        <div class="peer" style="flex:0.5; align-items:center; justify-content:center;">
            <div class="net-visuals" style="width:100%;">
                <div style="position:absolute; width:100%; height:1px; background:#444; top:50%;"></div>
                <!-- packets go here -->
            </div>
            <div style="font-size:10px; color:#aaa; margin-top:10px; text-align:center;">Network Overhead:<br><span id="netStat" style="color:#0f0;font-size:20px;">0 Bytes</span></div>
        </div>
        
        <!-- PEER B (Receiver) -->
        <div class="peer" id="peerB">
            <h2>📱 Client B (Leecher)</h2>
            <div class="log" id="logB"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
