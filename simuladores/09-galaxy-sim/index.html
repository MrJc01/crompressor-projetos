<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CROM Test 99 — 3D Galaxy N-Body Gravitational Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#e0e0ff;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block}#hud{position:fixed;top:15px;left:15px;background:rgba(0,0,20,0.9);border:1px solid #ffaa40;border-radius:10px;padding:15px;font-size:11px;z-index:10;backdrop-filter:blur(8px)}
h1{font-size:14px;color:#ffcc60;margin-bottom:8px}.s{color:#8888cc;margin:3px 0}
.btn{display:inline-block;padding:5px 12px;background:#1a1000;border:1px solid #aa8030;border-radius:4px;color:#ffcc88;cursor:pointer;font-size:10px;margin:2px;font-family:inherit}.btn:hover{background:#302000}
.hint{font-size:9px;color:#4466aa;margin-top:8px;line-height:1.6;border-top:1px solid #1a1a30;padding-top:8px}

@media (max-width: 900px) {
    #hud { left:8px; right:8px; top:8px; font-size:10px; }
}
@media (max-width: 600px) {
    #hud { padding:10px; }
    h1 { font-size:12px; }
    .hint { display:none; }
}
</style>
</head>
<body>
<div id="hud">
<h1>🌌 3D Galaxy N-Body Simulator</h1>
<div class="s" id="info">Stars: 0 | Time: 0 Myr</div>
<div>
<span class="btn" onclick="genGalaxy(500)">500★</span>
<span class="btn" onclick="genGalaxy(1500)">1500★</span>
<span class="btn" onclick="addBlackHole()">🕳️ Black Hole</span>
<span class="btn" onclick="mergeGalaxy()">💫 Merge</span>
<span class="btn" onclick="resetCam()">📷 Reset Cam</span>
</div>
<div class="hint">
🖱️ <b>Right drag:</b> Orbit 3D<br>
🖱️ <b>Middle drag:</b> Pan<br>
🖱️ <b>Scroll:</b> Zoom (infinite)<br>
🖱️ <b>Shift+Click:</b> Spawn black hole at cursor
</div>
</div>
<canvas id="c"></canvas>
<script>
// Fast seeded PRNG (Mulberry32) — deterministic but high-performance
let _seed = 42;
function srand(s) { _seed = s; }
function rand() {
    _seed |= 0; _seed = _seed + 0x6D2B79F5 | 0;
    let t = Math.imul(_seed ^ _seed >>> 15, 1 | _seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

const C=document.getElementById('c'),X=C.getContext('2d');let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();window.onresize=resize;

// === 3D CAMERA ===
let camTheta=-0.2,camPhi=0.5,camDist=800,panX=0,panY=0;
let orbiting=false,panning=false,orbS={},panS={};
let ghostPos=null;

let stars=[],G=0.5,dt=0.08,time=0;

function project(x,y,z){
  let ct=Math.cos(camTheta),st=Math.sin(camTheta),cp=Math.cos(camPhi),sp=Math.sin(camPhi);
  let x1=x*ct+z*st,z1=-x*st+z*ct;
  let y1=y*cp-z1*sp,z2=y*sp+z1*cp+camDist;
  if(z2<1)z2=1;
  let s=700/z2;
  return{x:x1*s+W/2+panX,y:-y1*s+H/2+panY,z:z2,s};
}

function unproject(sx,sy){
  return{x:(sx-W/2-panX)*camDist/700*0.8,y:-(sy-H/2-panY)*camDist/700*0.8,z:0};
}

function genGalaxy(n){
  srand(42); // deterministic seed
  stars=[];
  stars.push({x:0,y:0,z:0,vx:0,vy:0,vz:0,mass:5000,r:5,color:'#fff'});
  for(let i=0;i<n;i++){
    let angle=rand()*Math.PI*2;
    let dist=30+rand()*300;
    let tilt=(rand()-0.5)*30;
    let speed=Math.sqrt(G*5000/dist)*0.8;
    let hue=200+dist*0.2+rand()*40;
    stars.push({
      x:Math.cos(angle)*dist,y:tilt,z:Math.sin(angle)*dist,
      vx:-Math.sin(angle)*speed+(rand()-0.5)*0.3,
      vy:(rand()-0.5)*0.2,
      vz:Math.cos(angle)*speed+(rand()-0.5)*0.3,
      mass:0.1+rand()*2,r:0.5+rand()*1.2,
      color:`hsl(${hue},${60+rand()*40}%,${50+rand()*40}%)`
    });
  }
  time=0;
}

function addBlackHoleAt(bx,by,bz){
  stars.push({x:bx,y:by,z:bz,vx:(rand()-0.5)*2,vy:(rand()-0.5),vz:(rand()-0.5)*2,mass:3000,r:7,color:'#8000ff'});
}
function addBlackHole(){addBlackHoleAt((rand()-0.5)*200,0,(rand()-0.5)*200)}

function mergeGalaxy(){
  let ox=300,oz=-200;
  stars.push({x:ox,y:20,z:oz,vx:-3,vy:0,vz:2,mass:3000,r:5,color:'#ff8800'});
  for(let i=0;i<300;i++){
    let a=rand()*Math.PI*2,d=20+rand()*100;
    let s=Math.sqrt(G*3000/d)*0.7;
    stars.push({x:ox+Math.cos(a)*d,y:20+(rand()-0.5)*15,z:oz+Math.sin(a)*d,
      vx:-3-Math.sin(a)*s,vy:(rand()-0.5)*0.3,vz:2+Math.cos(a)*s,
      mass:0.1+rand(),r:0.5+rand(),color:`hsl(${30+rand()*30},80%,60%)`});
  }
}
function resetCam(){camTheta=-0.2;camPhi=0.5;camDist=800;panX=0;panY=0}

function simulate(){
  let massive=stars.filter(s=>s.mass>100);
  for(let i=0;i<stars.length;i++){
    let s=stars[i];let ax=0,ay=0,az=0;
    for(let j=0;j<massive.length;j++){
      if(massive[j]===s)continue;
      let dx=massive[j].x-s.x,dy=massive[j].y-s.y,dz=massive[j].z-s.z;
      let dist2=dx*dx+dy*dy+dz*dz+100;
      let f=G*massive[j].mass/dist2;
      let dist=Math.sqrt(dist2);
      ax+=f*dx/dist;ay+=f*dy/dist;az+=f*dz/dist;
    }
    s.vx+=ax*dt;s.vy+=ay*dt;s.vz+=az*dt;
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.z+=s.vz*dt;
  }
  time+=dt;
}

function draw(){
  X.fillStyle='rgba(0,0,0,0.25)';X.fillRect(0,0,W,H);
  simulate();

  // Grid plane (faint)
  X.strokeStyle='rgba(50,50,80,0.1)';X.lineWidth=0.5;
  for(let g=-400;g<=400;g+=80){
    let a=project(g,0,-400),b=project(g,0,400);
    X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke();
    a=project(-400,0,g);b=project(400,0,g);
    X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke();
  }

  // Ghost preview
  if(ghostPos){
    let gp=project(ghostPos.x,ghostPos.y,ghostPos.z);
    X.globalAlpha=0.4;X.strokeStyle='#8000ff';X.lineWidth=2;
    X.beginPath();X.arc(gp.x,gp.y,20,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(128,0,255,0.1)';X.fill();
    X.font='10px monospace';X.fillStyle='#aa60ff';X.fillText('🕳️ Black Hole',gp.x+25,gp.y);
    X.globalAlpha=1;
  }

  let sorted=stars.map((s,i)=>{let p=project(s.x,s.y,s.z);return{sx:p.x,sy:p.y,sz:p.z,ss:p.s,mass:s.mass,r:s.r,color:s.color,idx:i}});
  sorted.sort((a,b)=>b.sz-a.sz);

  sorted.forEach(s=>{
    let r=Math.max(0.5,s.r*s.ss*0.5);
    let alpha=Math.min(1,Math.max(0.15,600/s.sz));
    if(s.mass>100){
      X.shadowBlur=15+r*2;X.shadowColor=s.color;
      X.globalAlpha=alpha;X.fillStyle=s.color;
      X.beginPath();X.arc(s.sx,s.sy,r*1.5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    } else {
      X.globalAlpha=alpha*0.8;X.fillStyle=s.color;
      X.beginPath();X.arc(s.sx,s.sy,r,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
  });

  document.getElementById('info').textContent=`Stars: ${stars.length} | Time: ${time.toFixed(0)} Myr | Zoom: ${(800/camDist).toFixed(1)}x`;
  requestAnimationFrame(draw);
}

// === CONTROLS ===
C.addEventListener('mousedown',e=>{
  if(e.button===2){orbiting=true;orbS={x:e.clientX,y:e.clientY,t:camTheta,p:camPhi};e.preventDefault();}
  else if(e.button===1){panning=true;panS={x:e.clientX,y:e.clientY,px:panX,py:panY};e.preventDefault();}
  else if(e.button===0&&e.shiftKey){let wp=unproject(e.clientX,e.clientY);addBlackHoleAt(wp.x,wp.y,wp.z);}
});
C.addEventListener('mouseup',e=>{if(e.button===2)orbiting=false;if(e.button===1)panning=false;});
C.addEventListener('mousemove',e=>{
  if(e.shiftKey){ghostPos=unproject(e.clientX,e.clientY);}else{ghostPos=null;}
  if(orbiting){camTheta=orbS.t+(e.clientX-orbS.x)*0.005;camPhi=orbS.p+(e.clientY-orbS.y)*0.005;camPhi=Math.max(-Math.PI/2+0.05,Math.min(Math.PI/2-0.05,camPhi));}
  if(panning){panX=panS.px+(e.clientX-panS.x);panY=panS.py+(e.clientY-panS.y);}
});
C.addEventListener('wheel',e=>{e.preventDefault();camDist*=e.deltaY>0?1.08:0.92;camDist=Math.max(5,camDist);},{passive:false});
C.addEventListener('contextmenu',e=>e.preventDefault());

genGalaxy(1000);draw();
</script>
<script src="../crom-bridge.js"></script>
<script>
    // CROM: Compress star position data (lightweight - no getImageData)
    setInterval(() => {
        if(!cromBridge.isReady() || !stars.length) return;
        // Compress just the star position float data, NOT the canvas pixels
        const posData = new Float32Array(stars.length * 3);
        for(let i = 0; i < stars.length; i++) {
            posData[i*3] = stars[i].x;
            posData[i*3+1] = stars[i].y;
            posData[i*3+2] = stars[i].z;
        }
        cromBridge.compress(posData);
    }, 5000);
</script>
</body>
</html>
