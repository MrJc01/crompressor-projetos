<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CROM Test 96 — Real-Time Software Raytracer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#080818;color:#e0e0ff;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
h1{font-size:16px;color:#ff8040;margin-bottom:8px}.s{font-size:11px;color:#8888cc;margin-bottom:10px}
#info{font-size:11px;color:#40ff80;margin-top:8px}
canvas{border:2px solid #3030aa;border-radius:4px}

/* CROM Responsive Bridge */
@media (max-width: 900px) {
    body { flex-direction: column !important; overflow-y: auto !important; overflow-x: hidden !important; }
    body > div:first-child, .sidebar, .info-panel, .panel-left { 
        width: auto !important; min-width: 0 !important; max-width: 100% !important;
        border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.1) !important;
    }
    .workspace, .main-view { padding: 15px !important; }
}
@media (max-width: 600px) {
    body { font-size: 14px !important; }
    h1, h2 { font-size: 20px !important; }
    .editors-row, .control-panel, .metrics-grid { flex-direction: column !important; }
    canvas { max-height: 50vh !important; }
}
</style>
</head>
<body>
<h1>💎 CROM Real-Time Software Raytracer</h1>
<p class="s">Raytracer com reflexão, sombras e esferas renderizando pixel-a-pixel no CPU do browser</p>
<canvas id="c" width="320" height="240"></canvas>
<div id="info">Rendering...</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),W=320,H=240;
const img=X.createImageData(W,H);
let t=0;

function vec(x,y,z){return{x,y,z}}
function add(a,b){return vec(a.x+b.x,a.y+b.y,a.z+b.z)}
function sub(a,b){return vec(a.x-b.x,a.y-b.y,a.z-b.z)}
function mul(a,s){return vec(a.x*s,a.y*s,a.z*s)}
function dot(a,b){return a.x*b.x+a.y*b.y+a.z*b.z}
function len(a){return Math.sqrt(dot(a,a))}
function norm(a){let l=len(a);return l>0?mul(a,1/l):a}
function reflect(i,n){return sub(i,mul(n,2*dot(i,n)))}

const spheres=[
  {c:vec(0,0,6),r:1,color:vec(255,60,60),spec:0.8,refl:0.4},
  {c:vec(-2.5,0,8),r:1.5,color:vec(60,60,255),spec:0.6,refl:0.3},
  {c:vec(2,1,7),r:0.8,color:vec(60,255,60),spec:0.9,refl:0.5},
  {c:vec(0,-101,6),r:100,color:vec(200,200,200),spec:0.1,refl:0.1},
];
const lights=[vec(-5,5,-2),vec(5,3,0)];

function intersect(o,d,s){
  let oc=sub(o,s.c),b=2*dot(oc,d),c=dot(oc,oc)-s.r*s.r,disc=b*b-4*c;
  if(disc<0)return-1;let sq=Math.sqrt(disc),t1=(-b-sq)/2,t2=(-b+sq)/2;
  if(t1>0.001)return t1;if(t2>0.001)return t2;return-1;
}

function trace(o,d,depth){
  let closest=Infinity,hitS=null;
  for(let s of spheres){let t=intersect(o,d,s);if(t>0&&t<closest){closest=t;hitS=s;}}
  if(!hitS)return vec(10+d.y*20,10+d.y*15,30+d.y*40);
  let p=add(o,mul(d,closest)),n=norm(sub(p,hitS.c)),col=vec(0,0,0);
  for(let l of lights){
    let toL=norm(sub(l,p)),sh=false;
    for(let s of spheres)if(intersect(add(p,mul(n,0.001)),toL,s)>0){sh=true;break;}
    if(!sh){
      let diff=Math.max(0,dot(n,toL)),spec=Math.pow(Math.max(0,dot(reflect(mul(toL,-1),n),d)),32)*hitS.spec;
      col=add(col,add(mul(hitS.color,diff/255),vec(spec*200,spec*200,spec*200)));
    }
  }
  col=vec(Math.min(255,col.x*128),Math.min(255,col.y*128),Math.min(255,col.z*128));
  if(depth<2&&hitS.refl>0){let rc=trace(add(p,mul(n,0.001)),reflect(d,n),depth+1);col=add(mul(col,1-hitS.refl),mul(rc,hitS.refl));}
  return col;
}

function render(){
  spheres[0].c.x=Math.sin(t)*2;spheres[0].c.z=6+Math.cos(t)*1.5;
  spheres[2].c.y=Math.sin(t*1.3)*1.5;
  let fov=1.2,asp=W/H;
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    let dx=(2*px/W-1)*asp*fov,dy=(1-2*py/H)*fov;
    let col=trace(vec(0,1,0),norm(vec(dx,dy,1)),0);
    let i=(py*W+px)*4;img.data[i]=Math.min(255,col.x);img.data[i+1]=Math.min(255,col.y);img.data[i+2]=Math.min(255,col.z);img.data[i+3]=255;
  }
  X.putImageData(img,0,0);t+=0.03;
  document.getElementById('info').textContent=`Frame time: ${(performance.now()%10000).toFixed(0)}ms | Spheres: ${spheres.length} | Reflections: 2 bounces`;
  requestAnimationFrame(render);
}
render();
</script>
<script src="../crom-bridge.js"></script>
<script>

    // CROM: Comprimir output de pixels do raytracer
    setInterval(() => {
        if(!cromBridge.isReady()) return;
        const c = document.querySelector('canvas');
        if(c) { const ctx = c.getContext('2d'); const d = ctx.getImageData(0,0,c.width,c.height); cromBridge.compress(d.data); }
    }, 3000);
    
</script>
</body>
</html>
