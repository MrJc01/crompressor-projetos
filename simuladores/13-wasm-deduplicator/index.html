<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROM OPFS Deduplicador In-Browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#0b0c10; color:#c5c6c7; font-family:'Inter', sans-serif; overflow:hidden; }
        #app { display: flex; height: 100vh; }
        .sidebar { width: 300px; background:#1f2833; padding: 20px; border-right: 2px solid #45a29e; display:flex; flex-direction:column; gap:15px; }
        .main-view { flex: 1; padding: 30px; position: relative; }
        
        .dropzone { 
            border: 2px dashed #45a29e; border-radius: 12px; height: 180px; 
            display:flex; align-items:center; justify-content:center; flex-direction:column;
            background: rgba(69, 162, 158, 0.05); transition: 0.3s; cursor:pointer;
        }
        .dropzone.dragover { background: rgba(69, 162, 158, 0.2); border-color:#66fcf1; transform:scale(1.02); }
        .dropzone h3 { margin:0; color:#66fcf1; font-weight:800;}
        .dropzone p { margin: 5px 0 0; font-size:12px; color:#c5c6c7; }

        .stat-card { background:#0b0c10; padding:15px; border-radius:8px; border-left:4px solid #66fcf1; }
        .stat-val { font-size: 24px; font-weight:800; color:#fff; font-family:'JetBrains Mono', monospace;}
        .stat-lbl { font-size: 10px; text-transform:uppercase; letter-spacing:1px; color:#c5c6c7;}

        .canvas-container { width:100%; height: 100%; border-radius:12px; overflow:hidden; border:1px solid #1f2833; position:relative; }
        canvas { width:100%; height:100%; background:#000; }
        
        .overlay { position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,0,0,0.7); padding:15px; border-radius:8px; border:1px solid #66fcf1;}
        .overlay h4 { margin:0 0 10px 0; color:#66fcf1;}
        .log { height:150px; width:300px; overflow-y:auto; font-family:'JetBrains Mono', monospace; font-size:10px; color:#45a29e; }
    
/* CROM Responsive Bridge */
@media (max-width: 900px) {
    body { flex-direction: column !important; overflow-y: auto !important; overflow-x: hidden !important; }
    body > div:first-child, .sidebar, .info-panel, .panel-left { 
        width: auto !important; min-width: 0 !important; max-width: 100% !important;
        border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.1) !important;
    }
    .workspace, .main-view { padding: 15px !important; }
}
@media (max-width: 600px) {
    body { font-size: 14px !important; }
    h1, h2 { font-size: 20px !important; }
    .editors-row, .control-panel, .metrics-grid { flex-direction: column !important; }
    canvas { max-height: 50vh !important; }
}
</style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <h2 style="margin:0;color:#fff;">📂 CROM OPFS Deduplicador</h2>
            <p style="font-size:13px; margin:0 0 10px 0;">Engolfo Massivo + LSH Node Deduplication directly via JS/WASM.</p>
            
            <div class="dropzone" id="dropzone">
                <h3>Drag & Drop</h3>
                <p>Múltiplos arquivos ou Pastas</p>
            </div>

            <div class="stat-card" style="border-left-color:#ff44aa;">
                <div class="stat-lbl">Tamanho Raw na RAM (OPFS)</div>
                <div class="stat-val" id="rawSize">0 Bytes</div>
            </div>

            <div class="stat-card" style="border-left-color:#00ff88;">
                <div class="stat-lbl">Tamanho Codebook Gerado</div>
                <div class="stat-val" id="cromSize">0 Bytes</div>
            </div>

            <div class="stat-card" style="border-left-color:#4466ff;">
                <div class="stat-lbl">Deduplicação B-Tree O(1)</div>
                <div class="stat-val" id="ratio">1.0x</div>
            </div>
            
        </div>
        <div class="main-view">
            <div class="canvas-container">
                <canvas id="visualizer"></canvas>
                <div class="overlay">
                    <h4>WebAssembly LSH Stream</h4>
                    <div class="log" id="log"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
<script src="../crom-bridge.js"></script>
</body>
</html>
