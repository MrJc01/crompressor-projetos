<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CROM Test 97 — Browser Operating System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a5276;font-family:Segoe UI,sans-serif;overflow:hidden;height:100vh;user-select:none}
#desktop{width:100%;height:calc(100vh - 40px);position:relative}
.icon{position:absolute;width:70px;text-align:center;cursor:pointer;color:#fff;font-size:11px}.icon:hover{background:rgba(255,255,255,0.15);border-radius:4px}
.icon img{width:40px;height:40px;display:block;margin:4px auto}
.icon span{text-shadow:1px 1px 2px #000}
#taskbar{position:fixed;bottom:0;left:0;width:100%;height:40px;background:rgba(0,0,0,0.85);display:flex;align-items:center;padding:0 8px;gap:4px;z-index:1000}
.tbtn{padding:6px 14px;color:#fff;font-size:12px;cursor:pointer;border-radius:3px;transition:background .2s}.tbtn:hover{background:rgba(255,255,255,0.15)}
#start{background:#0078d4;font-weight:bold;border-radius:3px}
#clock{margin-left:auto;color:#ccc;font-size:12px;padding-right:8px}
.win{position:absolute;background:#1e1e2e;border:1px solid #444;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);min-width:300px;min-height:200px;overflow:hidden;z-index:100}
.win-title{background:#2d2d3d;padding:6px 10px;display:flex;align-items:center;cursor:move;font-size:12px;color:#ddd}
.win-title span{flex:1}
.win-close{width:20px;height:20px;background:#ff4444;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.win-body{padding:10px;color:#ccc;font-size:12px;height:calc(100% - 30px);overflow:auto}
#terminal-input{background:transparent;border:none;color:#40ff80;font-family:monospace;font-size:12px;outline:none;width:90%}
</style>
</head>
<body>
<div id="desktop"></div>
<div id="taskbar">
<div class="tbtn" id="start" onclick="toggleMenu()">⊞ Start</div>
<div class="tbtn" onclick="openApp('terminal')">Terminal</div>
<div class="tbtn" onclick="openApp('files')">Files</div>
<div class="tbtn" onclick="openApp('calc')">Calc</div>
<div class="tbtn" onclick="openApp('paint')">Paint</div>
<div class="tbtn" onclick="openApp('sysmon')">SysMon</div>
<div id="clock"></div>
</div>
<script>
let winZ=100,wins=[];
const FS={'~':{type:'dir',children:{'Documents':{type:'dir',children:{'readme.txt':{type:'file',content:'CROM V23 Singularity OS\nRunning in browser.'},'notes.md':{type:'file',content:'# Todo\n- Compress universe\n- Deploy to edge'}}},'Desktop':{type:'dir',children:{}},'system.log':{type:'file',content:'[OK] Kernel loaded\n[OK] Filesystem mounted\n[OK] Network ready'}}}};

function createWindow(title,w,h,content){
  let win=document.createElement('div');win.className='win';
  win.style.width=w+'px';win.style.height=h+'px';
  win.style.left=80+Math.random()*300+'px';win.style.top=40+Math.random()*200+'px';
  win.style.zIndex=++winZ;
  win.innerHTML=`<div class="win-title"><span>${title}</span><div class="win-close" onclick="this.closest('.win').remove()">✕</div></div><div class="win-body">${content}</div>`;
  document.getElementById('desktop').appendChild(win);
  let t=win.querySelector('.win-title'),dragging=false,ox,oy;
  t.onmousedown=e=>{dragging=true;ox=e.clientX-win.offsetLeft;oy=e.clientY-win.offsetTop;win.style.zIndex=++winZ};
  document.onmousemove=e=>{if(dragging){win.style.left=e.clientX-ox+'px';win.style.top=e.clientY-oy+'px'}};
  document.onmouseup=()=>dragging=false;
  return win;
}

function openApp(app){
  if(app==='terminal'){
    let w=createWindow('🖥 Terminal',500,300,'<div id="term-out" style="font-family:monospace;color:#40ff80;font-size:11px;white-space:pre;max-height:220px;overflow:auto">CROM OS v23.0 Shell\n$ </div><div style="display:flex;margin-top:4px"><span style="color:#40ff80;font-family:monospace">$ </span><input id="terminal-input" onkeydown="termKey(event)"></div>');
    w.querySelector('#terminal-input').focus();
  }else if(app==='files'){
    let html='<div style="font-family:monospace;font-size:11px">';
    function listDir(dir,indent){for(let k in dir.children){let c=dir.children[k];html+=`<div style="padding:2px 0;cursor:pointer" onclick="alert('${c.type==='file'?c.content.replace(/'/g,"\\'"):k}')">${'  '.repeat(indent)}${c.type==='dir'?'📁':'📄'} ${k}</div>`;if(c.type==='dir')listDir(c,indent+1);}}
    listDir(FS['~'],0);html+='</div>';
    createWindow('📁 File Manager',400,300,html);
  }else if(app==='calc'){
    let html='<input id="calc-display" style="width:100%;padding:8px;background:#111;color:#fff;border:1px solid #333;font-size:18px;text-align:right;border-radius:4px;margin-bottom:8px" readonly><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">';
    '789/456*123-0.=+'.split('').forEach(c=>{html+=`<div style="padding:12px;background:#2a2a3a;text-align:center;cursor:pointer;border-radius:4px;font-size:16px" onclick="calcBtn('${c}')">${c}</div>`;});
    html+='<div style="padding:12px;background:#ff4444;text-align:center;cursor:pointer;border-radius:4px;grid-column:span 4" onclick="calcBtn(\'C\')">C</div></div>';
    createWindow('🔢 Calculator',220,340,html);
  }else if(app==='paint'){
    let w=createWindow('🎨 Paint',450,350,'<canvas id="paint-canvas" width="430" height="300" style="background:#fff;cursor:crosshair;border-radius:4px"></canvas>');
    let pc=w.querySelector('#paint-canvas'),px=pc.getContext('2d'),drawing=false;
    px.strokeStyle='#000';px.lineWidth=2;px.lineCap='round';
    pc.onmousedown=e=>{drawing=true;px.beginPath();px.moveTo(e.offsetX,e.offsetY)};
    pc.onmousemove=e=>{if(drawing){px.lineTo(e.offsetX,e.offsetY);px.stroke()}};
    pc.onmouseup=()=>drawing=false;
  }else if(app==='sysmon'){
    let w=createWindow('📊 System Monitor',380,250,'<canvas id="sysmon-canvas" width="360" height="200"></canvas>');
    let sc=w.querySelector('#sysmon-canvas'),sx=sc.getContext('2d'),cpu=[],mem=[];
    setInterval(()=>{cpu.push(20+Math.random()*60);mem.push(40+Math.random()*30);if(cpu.length>60)cpu.shift();if(mem.length>60)mem.shift();
      sx.fillStyle='#1e1e2e';sx.fillRect(0,0,360,200);sx.font='10px monospace';sx.fillStyle='#888';sx.fillText('CPU %',5,12);sx.fillText('MEM %',5,112);
      sx.strokeStyle='#40ff80';sx.lineWidth=1.5;sx.beginPath();cpu.forEach((v,i)=>{let x=i*6,y=90-v*0.8;i===0?sx.moveTo(x,y):sx.lineTo(x,y)});sx.stroke();
      sx.strokeStyle='#ff8040';sx.beginPath();mem.forEach((v,i)=>{let x=i*6,y=190-v*0.8;i===0?sx.moveTo(x,y):sx.lineTo(x,y)});sx.stroke();
    },200);
  }
}

let calcExpr='';
function calcBtn(c){let d=document.getElementById('calc-display');if(!d)return;if(c==='C'){calcExpr='';d.value='';}else if(c==='='){try{d.value=eval(calcExpr)}catch(e){d.value='ERR'}calcExpr=d.value.toString();}else{calcExpr+=c;d.value=calcExpr;}}

function termKey(e){
  if(e.key!=='Enter')return;let inp=e.target,cmd=inp.value.trim(),out=document.getElementById('term-out');
  let res='';
  if(cmd==='help')res='Commands: help, ls, cat, whoami, uname, date, clear, neofetch';
  else if(cmd==='ls')res='Documents/  Desktop/  system.log';
  else if(cmd==='whoami')res='root@crom-singularity';
  else if(cmd==='uname')res='CROM-OS 23.0 Singularity x86_64 Browser/WASM';
  else if(cmd==='date')res=new Date().toString();
  else if(cmd==='clear'){out.textContent='$ ';inp.value='';return;}
  else if(cmd.startsWith('cat '))res=cmd==='cat system.log'?'[OK] Kernel loaded\n[OK] Filesystem mounted\n[OK] Network ready':'File not found';
  else if(cmd==='neofetch')res='  ⣿⣿⣿  root@crom-singularity\n  ⣿  ⣿  OS: CROM-OS 23.0 Singularity\n  ⣿⣿⣿  Kernel: WASM Browser Runtime\n  ⣿  ⣿  Shell: crom-sh 1.0\n  ⣿⣿⣿  CPU: Semantic O(1) Engine';
  else res=`crom-sh: ${cmd}: command not found`;
  out.textContent+=cmd+'\n'+res+'\n$ ';out.scrollTop=out.scrollHeight;inp.value='';
}

function toggleMenu(){openApp('terminal')}
setInterval(()=>{let d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString()},1000);
openApp('terminal');
</script>
</body>
</html>
