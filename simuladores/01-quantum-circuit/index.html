<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROM Test 91 — Quantum Circuit Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0ff;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block}
#hud{position:fixed;top:20px;left:20px;z-index:10;background:rgba(0,0,30,0.85);border:1px solid #4040ff;border-radius:12px;padding:20px;max-width:380px;backdrop-filter:blur(10px)}
h1{font-size:16px;color:#80f0ff;margin-bottom:8px}
.info{font-size:11px;color:#8888cc;line-height:1.6}
#qubits{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.qubit{width:44px;height:44px;border-radius:50%;border:2px solid #6060ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;cursor:pointer;transition:all .3s}
.qubit:hover{transform:scale(1.2);box-shadow:0 0 20px #6060ff}
.qubit.superposition{border-color:#ff40ff;animation:pulse 1s infinite}
.qubit.entangled{border-color:#40ff80;box-shadow:0 0 15px #40ff80}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#gates{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.gate{padding:6px 12px;background:#1a1a40;border:1px solid #4040aa;border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s}
.gate:hover{background:#3030aa;transform:translateY(-2px)}
#log{margin-top:12px;max-height:120px;overflow-y:auto;font-size:10px;color:#6666aa;border-top:1px solid #2020aa;padding-top:8px}
#result{position:fixed;bottom:20px;left:20px;background:rgba(0,200,100,0.15);border:1px solid #40ff80;border-radius:8px;padding:12px 20px;font-size:12px;color:#40ff80;z-index:10}
</style>
</head>
<body>
<div id="hud">
<h1>⚛️ CROM Quantum Circuit Simulator</h1>
<p class="info">Simulador de Circuito Quântico real rodando no navegador.<br>Clique nos qubits para medir. Use as portas abaixo.</p>
<div id="qubits"></div>
<div id="gates">
<div class="gate" onclick="applyGate('H')">H (Hadamard)</div>
<div class="gate" onclick="applyGate('X')">X (NOT)</div>
<div class="gate" onclick="applyGate('Z')">Z (Phase)</div>
<div class="gate" onclick="applyGate('CNOT')">CNOT</div>
<div class="gate" onclick="applyGate('T')">T (π/8)</div>
<div class="gate" onclick="measure()">📏 Measure All</div>
<div class="gate" onclick="resetCircuit()">🔄 Reset</div>
</div>
<div id="log"></div>
</div>
<div id="result">Bateria 91 | Qubits: 8 | Estado: Pronto</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.onresize=resize;

class Qubit{
  constructor(i){this.index=i;this.alpha={re:1,im:0};this.beta={re:0,im:0};this.measured=null;this.entangledWith=null}
  get prob0(){return this.alpha.re**2+this.alpha.im**2}
  get prob1(){return this.beta.re**2+this.beta.im**2}
  get state(){
    if(this.measured!==null)return`|${this.measured}⟩`;
    if(this.prob0>0.99)return'|0⟩';
    if(this.prob1>0.99)return'|1⟩';
    return'|ψ⟩';
  }
}

let qubits=[];let selectedQubit=0;let logLines=[];let particles=[];

function initQubits(){
  qubits=[];
  for(let i=0;i<8;i++)qubits.push(new Qubit(i));
  renderQubits();
  addLog('Circuit initialized: 8 qubits in |00000000⟩');
}

function renderQubits(){
  const container=document.getElementById('qubits');
  container.innerHTML='';
  qubits.forEach((q,i)=>{
    const el=document.createElement('div');
    el.className='qubit'+(q.measured===null&&q.prob1>0.01&&q.prob0>0.01?' superposition':'')+(q.entangledWith!==null?' entangled':'');
    el.textContent=q.state;
    el.style.background=`rgba(${Math.floor(q.prob1*255)},${Math.floor(q.prob0*100)},${Math.floor(q.prob0*255)},0.3)`;
    el.onclick=()=>{selectedQubit=i;addLog(`Selected qubit q${i}`)};
    container.appendChild(el);
  });
}

function applyGate(gate){
  const q=qubits[selectedQubit];
  if(q.measured!==null){addLog('❌ Cannot apply gate to measured qubit');return}
  if(gate==='H'){
    const a={re:(q.alpha.re+q.beta.re)/Math.SQRT2,im:(q.alpha.im+q.beta.im)/Math.SQRT2};
    const b={re:(q.alpha.re-q.beta.re)/Math.SQRT2,im:(q.alpha.im-q.beta.im)/Math.SQRT2};
    q.alpha=a;q.beta=b;
    addLog(`H gate → q${selectedQubit}: prob|0⟩=${q.prob0.toFixed(3)} prob|1⟩=${q.prob1.toFixed(3)}`);
  }else if(gate==='X'){
    [q.alpha,q.beta]=[q.beta,q.alpha];
    addLog(`X gate → q${selectedQubit}: state flipped`);
  }else if(gate==='Z'){
    q.beta={re:-q.beta.re,im:-q.beta.im};
    addLog(`Z gate → q${selectedQubit}: phase flipped`);
  }else if(gate==='T'){
    const cos=Math.cos(Math.PI/8),sin=Math.sin(Math.PI/8);
    q.beta={re:q.beta.re*cos-q.beta.im*sin,im:q.beta.re*sin+q.beta.im*cos};
    addLog(`T gate → q${selectedQubit}: π/8 phase rotation`);
  }else if(gate==='CNOT'){
    const target=(selectedQubit+1)%8;
    if(q.prob1>0.5){
      const tq=qubits[target];
      [tq.alpha,tq.beta]=[tq.beta,tq.alpha];
      q.entangledWith=target;tq.entangledWith=selectedQubit;
    }
    addLog(`CNOT → control=q${selectedQubit} target=q${target}`);
  }
  spawnParticles(selectedQubit);
  renderQubits();
}

function measure(){
  qubits.forEach(q=>{
    if(q.measured===null){
      q.measured=Math.random()<q.prob0?0:1;
    }
  });
  const result=qubits.map(q=>q.measured).join('');
  addLog(`📏 MEASUREMENT: |${result}⟩`);
  document.getElementById('result').textContent=`Bateria 91 | Resultado: |${result}⟩ | ✅ Circuito colapsado`;
  renderQubits();
}

function resetCircuit(){initQubits();document.getElementById('result').textContent='Bateria 91 | Qubits: 8 | Estado: Pronto'}

function addLog(msg){
  logLines.push(msg);if(logLines.length>50)logLines.shift();
  document.getElementById('log').innerHTML=logLines.map(l=>`<div>${l}</div>`).join('');
  document.getElementById('log').scrollTop=9999;
}

function spawnParticles(qi){
  for(let i=0;i<20;i++){
    particles.push({x:W/2,y:H/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:1,color:`hsl(${qi*45},100%,70%)`});
  }
}

// Background: Bloch sphere visualization
let t=0;
function draw(){
  ctx.fillStyle='rgba(10,10,26,0.15)';ctx.fillRect(0,0,W,H);
  t+=0.01;
  // Draw quantum state paths
  const cx=W/2,cy=H/2,r=Math.min(W,H)*0.25;
  ctx.strokeStyle='rgba(80,80,255,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,r,r*0.3,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,r*0.3,r,0,0,Math.PI*2);ctx.stroke();

  qubits.forEach((q,i)=>{
    if(q.measured!==null)return;
    const theta=Math.acos(2*q.prob0-1);
    const phi=t*2+i*Math.PI/4;
    const px=cx+r*Math.sin(theta)*Math.cos(phi);
    const py=cy+r*Math.sin(theta)*Math.sin(phi)*0.3-r*Math.cos(theta);
    ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);
    ctx.fillStyle=`hsl(${i*45},100%,70%)`;ctx.fill();
    ctx.font='10px monospace';ctx.fillText(`q${i}`,px+8,py);
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.02;p.vx*=0.98;p.vy*=0.98;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;return true;
  });
  requestAnimationFrame(draw);
}
initQubits();draw();
</script>
</body>
</html>
